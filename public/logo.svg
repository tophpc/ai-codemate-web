<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 蓝紫渐变 -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B2CFF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 橙紫渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="200" cy="200" r="180" fill="#0A0E27"/>
  
  <!-- 外环光晕 -->
  <circle cx="200" cy="200" r="175" stroke="url(#brandGradient)" stroke-width="3" fill="none" opacity="0.5"/>
  
  <!-- 代码符号 - 左尖括号 -->
  <path d="M 140 150 L 110 200 L 140 250" stroke="url(#brandGradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- AI 大脑 - 中心六边形 -->
  <path d="M 200 140 L 245 165 L 245 215 L 200 240 L 155 215 L 155 165 Z" 
        fill="url(#brandGradient)" 
        opacity="0.9"
        filter="url(#glow)"/>
  
  <!-- AI 神经网络 - 内部连线 -->
  <circle cx="200" cy="190" r="15" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="180" cy="210" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="220" cy="210" r="8" fill="#FFFFFF" opacity="0.7"/>
  <line x1="200" y1="190" x2="180" y2="210" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="190" x2="220" y2="210" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  
  <!-- 代码符号 - 右尖括号 -->
  <path d="M 260 150 L 290 200 L 260 250" stroke="url(#brandGradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- 能量粒子 -->
  <circle cx="280" cy="120" r="6" fill="url(#accentGradient)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="280" r="5" fill="url(#accentGradient)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="260" r="4" fill="url(#accentGradient)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 底部文字 -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#brandGradient)" text-anchor="middle">AICodeMate</text>
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="12" fill="#A0AEC0" text-anchor="middle" letter-spacing="2">智码伙伴 · 编程未来</text>
</svg>
