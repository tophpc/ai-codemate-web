<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="visionBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27"/>
      <stop offset="50%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#2D1B4E"/>
    </linearGradient>
    
    <linearGradient id="visionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#7B2CFF"/>
    </linearGradient>
    
    <filter id="visionGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="1200" fill="url(#visionBg)"/>
  
  <!-- 科技感网格 -->
  <g stroke="rgba(0, 102, 255, 0.05)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="0" y1="800" x2="1200" y2="800"/>
    <line x1="0" y1="900" x2="1200" y2="900"/>
    <line x1="0" y1="1000" x2="1200" y2="1000"/>
    <line x1="0" y1="1100" x2="1200" y2="1100"/>
    <line x1="100" y1="0" x2="100" y2="1200"/>
    <line x1="300" y1="0" x2="300" y2="1200"/>
    <line x1="500" y1="0" x2="500" y2="1200"/>
    <line x1="700" y1="0" x2="700" y2="1200"/>
    <line x1="900" y1="0" x2="900" y2="1200"/>
    <line x1="1100" y1="0" x2="1100" y2="1200"/>
  </g>
  
  <!-- 装饰性光晕 -->
  <circle cx="600" cy="600" r="500" fill="url(#visionGrad)" opacity="0.03" filter="url(#visionGlow)"/>
  <circle cx="600" cy="600" r="400" fill="url(#visionGrad)" opacity="0.05" filter="url(#visionGlow)"/>
  <circle cx="600" cy="600" r="300" fill="url(#visionGrad)" opacity="0.08" filter="url(#visionGlow)"/>
  
  <!-- 顶部 Logo -->
  <g transform="translate(540, 80)">
    <circle cx="60" cy="60" r="55" fill="#0A0E27" stroke="url(#visionGrad)" stroke-width="2.5"/>
    <path d="M 40 45 L 28 60 L 40 75" stroke="url(#visionGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 80 45 L 92 60 L 80 75" stroke="url(#visionGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 60 40 L 72 48 L 72 64 L 60 72 L 48 64 L 48 48 Z" fill="url(#visionGrad)" opacity="0.9"/>
  </g>
  
  <!-- 主标题 -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#visionGrad)" text-anchor="middle" filter="url(#visionGlow)">AICodeMate 愿景</text>
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="24" fill="#A0AEC0" text-anchor="middle" letter-spacing="4">THE VISION OF FUTURE AI PROGRAMMING</text>
  
  <!-- 分隔线 -->
  <line x1="300" y1="300" x2="900" y2="300" stroke="url(#visionGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- 核心价值 1 -->
  <g transform="translate(150, 350)">
    <rect width="900" height="140" fill="rgba(255,255,255,0.03)" rx="20" stroke="rgba(0,102,255,0.15)" stroke-width="1.5"/>
    <circle cx="70" cy="70" r="45" fill="url(#visionGrad)" opacity="0.15"/>
    <text x="70" y="85" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">🤖</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#F5F7FA">AI 超能力普及</text>
    <text x="150" y="95" font-family="Arial, sans-serif" font-size="18" fill="#A0AEC0">让每个开发者都能拥有 AI 编程超能力，不再是大公司的专利</text>
  </g>
  
  <!-- 核心价值 2 -->
  <g transform="translate(150, 510)">
    <rect width="900" height="140" fill="rgba(255,255,255,0.03)" rx="20" stroke="rgba(123,44,255,0.15)" stroke-width="1.5"/>
    <circle cx="70" cy="70" r="45" fill="url(#visionGrad)" opacity="0.15"/>
    <text x="70" y="85" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">🤝</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#F5F7FA">人机协作新范式</text>
    <text x="150" y="95" font-family="Arial, sans-serif" font-size="18" fill="#A0AEC0">不是替代，而是增强。AI 与人类开发者和谐共生，共创未来</text>
  </g>
  
  <!-- 核心价值 3 -->
  <g transform="translate(150, 670)">
    <rect width="900" height="140" fill="rgba(255,255,255,0.03)" rx="20" stroke="rgba(255,149,0,0.15)" stroke-width="1.5"/>
    <circle cx="70" cy="70" r="45" fill="url(#visionGrad)" opacity="0.15"/>
    <text x="70" y="85" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">🌍</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#F5F7FA">全球开发者社区</text>
    <text x="150" y="95" font-family="Arial, sans-serif" font-size="18" fill="#A0AEC0">连接全球开发者，共享 AI 编程智慧，构建开放协作的生态系统</text>
  </g>
  
  <!-- 核心价值 4 -->
  <g transform="translate(150, 830)">
    <rect width="900" height="140" fill="rgba(255,255,255,0.03)" rx="20" stroke="rgba(0,102,255,0.15)" stroke-width="1.5"/>
    <circle cx="70" cy="70" r="45" fill="url(#visionGrad)" opacity="0.15"/>
    <text x="70" y="85" font-family="Arial, sans-serif" font-size="48" text-anchor="middle">🚀</text>
    <text x="150" y="60" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="#F5F7FA">编程效率革命</text>
    <text x="150" y="95" font-family="Arial, sans-serif" font-size="18" fill="#A0AEC0">将开发者从重复劳动中解放，专注于创造性和战略性工作</text>
  </g>
  
  <!-- 底部标语 -->
  <text x="600" y="1050" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="url(#visionGrad)" text-anchor="middle" filter="url(#visionGlow)">一起，让编程更美好</text>
  <text x="600" y="1100" font-family="Arial, sans-serif" font-size="24" fill="#A0AEC0" text-anchor="middle" letter-spacing="4">TOGETHER, MAKE PROGRAMMING BETTER</text>
  
  <!-- 底部装饰 -->
  <line x1="400" y1="1150" x2="800" y2="1150" stroke="url(#visionGrad)" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="1150" r="3" fill="url(#visionGrad)"/>
  <circle cx="600" cy="1150" r="3" fill="#FF9500"/>
  <circle cx="800" cy="1150" r="3" fill="url(#visionGrad)"/>
</svg>
